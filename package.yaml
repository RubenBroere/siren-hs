name:                siren-hs
version:             0.1.0.0
github:              "RubenBroere/siren-hs"
license:             MIT 
author:              "Olaf Boekholt and Ruben Broere"
maintainer:          "siren-hs@rubenbroere.com"
copyright:           "2026 Olaf Boekholt and Ruben Broere"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/RubenBroere/siren-hs#readme>

dependencies:
- base >= 4.7 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - containers
  - diagrams-lib
  - diagrams-svg
  - mtl

executables:
  siren-hs-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - directory
    - optparse-applicative
    - siren-hs

tests:
  siren-hs-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - containers
    - directory
    - siren-hs
    - tasty
    - tasty-hunit
    - tasty-quickcheck
